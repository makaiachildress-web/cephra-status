name: Uptime CI
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  uptime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.38.2
        with:
          command: "readme"
      - uses: upptime/uptime-monitor@v1.38.2
        with:
          command: "site"
      - uses: upptime/uptime-monitor@v1.38.2
        with:
          command: "response-time"
      - uses: upptime/uptime-monitor@v1.38.2
        with:
          command: "uptime"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          NOTIFICATIONS_DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
